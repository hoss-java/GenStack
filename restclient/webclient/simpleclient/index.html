<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REST Service Command Interface</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="console.css">
</head>
<body>
    <div class="app-wrapper">
        <header class="app-header">
            <div style="flex: 1;"></div>
            <div style="flex: 1; text-align: center;">
                <h1>REST Service Command Interface</h1>
                <p class="app-subtitle">Interactive Command Menu</p>
            </div>
            <div style="flex: 1; text-align: right;">
                <div class="theme-toggle" onclick="toggleTheme()">
                    <span id="themeLabel">Dark</span>
                    <div class="theme-toggle-switch" id="themeSwitch"></div>
                </div>
            </div>
        </header>
        
        <main class="app-main">
            <div id="menu-container" class="menu-container">
                <div class="loading">
                    <p>Initializing application...</p>
                </div>
            </div>
        </main>

        <!-- Console Window -->
        <div class="console-window" id="console-window">
            <div class="console-header">
                <span class="console-title">Console</span>
                <div class="console-controls">
                    <button class="console-btn" id="clear-btn">Clear</button>
                </div>
            </div>
            <div class="console-output"></div>
        </div>        

        <footer class="app-footer">
        </footer>
    </div>
    
    <!-- Console Toggle Icon Button -->
    <button class="console-toggle-btn">✕</button>
    

    
    <!-- Load scripts in order -->
    <script src="console.js"></script>
    <script src="consoleLogger.js"></script>
    <script src="script.js"></script>

    <script>
        // Clear button functionality
        document.getElementById('clear-btn')?.addEventListener('click', () => {
            window.consoleWindowInstance?.clear();
        });
    </script>
</body>
</html>
